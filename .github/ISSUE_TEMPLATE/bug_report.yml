name: Bug report
description: Report a defect in phi-crypto (NOT a security vulnerability — see SECURITY.md).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md (security@portphi.com).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands that reproduce the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: phi-crypto version, tag, or commit hash.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Rust toolchain version, and target (native / wasm32).
    validations:
      required: false
