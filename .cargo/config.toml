# Fully offline / local build: every dependency is read from the committed ./vendor directory,
# so no download from crates.io or GitHub happens at build time (the Rust counterpart of
# `go mod vendor` in phi-chain). Generated with `cargo vendor`; vendor/ is committed for full
# offline self-sufficiency. Build/test offline with `cargo build --offline` / `cargo test --offline`.

[source.crates-io]
replace-with = "vendored-sources"

# BBS+ (docknetwork) — the phi-bbs-v1 academic suite.
[source."git+https://github.com/docknetwork/crypto?rev=224f195b"]
git = "https://github.com/docknetwork/crypto"
rev = "224f195b"
replace-with = "vendored-sources"

# blstrs (MATTR fork) — BLS12-381 backend used by pairing_crypto for the bbs-2023 suite.
[source."git+https://github.com/mattrglobal/blstrs.git?rev=a0cb960"]
git = "https://github.com/mattrglobal/blstrs.git"
rev = "a0cb960"
replace-with = "vendored-sources"

# pairing_crypto (MATTR/DIF) — IRTF/W3C bbs-2023 conformant suite (native targets only).
[source."git+https://github.com/mattrglobal/pairing_crypto?tag=v0.4.4"]
git = "https://github.com/mattrglobal/pairing_crypto"
tag = "v0.4.4"
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"
