# cbindgen configuration for generating the C-ABI header.
# Generate: cargo build --release && cbindgen --config cbindgen.toml --output phi_crypto.h
language = "C"
include_guard = "PHI_CRYPTO_H"
tab_width = 4
documentation = true
documentation_style = "c"
autogen_warning = "/* Warning: this file is generated by cbindgen — do not edit manually. */"

[parse]
parse_deps = false

[export]
prefix = ""
# Only the extern "C" functions of the ffi module.
